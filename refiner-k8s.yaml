apiVersion: apps/v1
kind: Deployment
metadata:
  name: refiner
  namespace: refiner
  labels:
    app: refiner
    app.kubernetes.io/name: refiner
    app.kubernetes.io/part-of: refiner-cluster
    nmc.neuralmimicry.ai/workload: refiner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: refiner
  template:
    metadata:
      labels:
        app: refiner
        app.kubernetes.io/name: refiner
        app.kubernetes.io/part-of: refiner-cluster
        nmc.neuralmimicry.ai/workload: refiner
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
      - name: refiner
        image: ghcr.io/neuralmimicry/refiner:latest
        imagePullPolicy: IfNotPresent
        args: ["backend"]
        ports:
        - containerPort: 5001
          name: http
        env:
        - name: REFINER_HOST
          value: "0.0.0.0"
        - name: REFINER_PORT
          value: "5001"
        - name: REFINER_JOB_DIR
          value: "/app/job_data"
        - name: REFINER_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: refiner-secrets
              key: REFINER_SECRET_KEY
        - name: REFINER_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: refiner-secrets
              key: REFINER_ADMIN_PASSWORD
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
        volumeMounts:
        - name: job-data
          mountPath: /app/job_data
      volumes:
      - name: job-data
        persistentVolumeClaim:
          claimName: refiner-job-data
---
apiVersion: v1
kind: Service
metadata:
  name: refiner
  namespace: refiner
  labels:
    app.kubernetes.io/name: refiner
    app.kubernetes.io/part-of: refiner-cluster
    nmc.neuralmimicry.ai/workload: refiner
spec:
  selector:
    app: refiner
  ports:
  - name: http
    port: 5001
    targetPort: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: refiner-job-data
  namespace: refiner
  labels:
    app.kubernetes.io/name: refiner
    app.kubernetes.io/part-of: refiner-cluster
    nmc.neuralmimicry.ai/workload: refiner
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
