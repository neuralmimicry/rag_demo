openapi: 3.0.3
info:
  title: Refiner API
  version: 0.1.0
  description: |
    Backend API exposed by `refiner_web.py`.

    Refiner combines session-based web auth, assistant and planning endpoints,
    voice/STT ingestion, job orchestration, TODO routing, RAG indexing, MCP
    connectivity, token accounting, and Control Room telemetry.

    This specification tracks the current backend route families and
    representative request/response shapes used by the shipped UI.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://127.0.0.1:5001
    description: Default local backend
  - url: http://localhost:5001
    description: Alternate local backend host
security:
  - sessionAuth: []
tags:
  - name: Public
    description: Public health, metrics, and version routes
  - name: Auth
    description: Session, setup, login, SSO, and OIDC exchange routes
  - name: Assistant
    description: Requirements, form-fill, RAG+MCP, and playground planning APIs
  - name: Voice
    description: Voice tokens, capture adapters, and speech-to-text APIs
  - name: Jobs
    description: Job submission, workspace access, logs, and background actions
  - name: Inbox
    description: TODO routing, schedules, and generic subtasks
  - name: Access
    description: Projects, teams, access tree, and collaboration sessions
  - name: RAG
    description: Requirements import/export plus RAG indexing and query APIs
  - name: MCP
    description: Model Context Protocol server configuration and tool calls
  - name: Tokens
    description: Token ledger, secrets, and GitHub helper endpoints
  - name: Admin
    description: Control Room stats, worker telemetry, and audit logs
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Browser session cookie set by `/api/setup` or `/api/login`.
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token accepted by selected voice/STT endpoints.
    voiceToken:
      type: apiKey
      in: header
      name: X-Voice-Token
      description: Per-user voice token issued by `/api/voice/tokens`.
  parameters:
    jobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    taskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
    todoId:
      name: todo_id
      in: path
      required: true
      schema:
        type: string
    scheduleId:
      name: schedule_id
      in: path
      required: true
      schema:
        type: string
    tokenId:
      name: token_id
      in: path
      required: true
      schema:
        type: string
    sessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
    projectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
    teamId:
      name: team_id
      in: path
      required: true
      schema:
        type: string
    name:
      name: name
      in: path
      required: true
      schema:
        type: string
    requestId:
      name: request_id
      in: path
      required: true
      schema:
        type: string
    filename:
      name: filename
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated, but not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource state prevented the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    GenericObjectList:
      type: array
      items:
        $ref: '#/components/schemas/GenericObject'
    Error:
      type: object
      properties:
        error:
          type: string
          example: unauthorized
        details:
          type: string
        code:
          type: string
      required:
        - error
    StatusMessage:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
        jobs:
          type: integer
        workers:
          type: integer
        job_actions:
          $ref: '#/components/schemas/GenericObject'
        subtasks:
          $ref: '#/components/schemas/GenericObject'
        todo_scheduler:
          $ref: '#/components/schemas/GenericObject'
        continuum_autoscaler:
          $ref: '#/components/schemas/GenericObject'
        workers_summary:
          $ref: '#/components/schemas/GenericObject'
        sso:
          $ref: '#/components/schemas/GenericObject'
        stt_learning:
          $ref: '#/components/schemas/GenericObject'
    SessionState:
      type: object
      properties:
        authenticated:
          type: boolean
        user:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
      required:
        - username
        - password
    SetupRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        confirm:
          type: string
          format: password
        email:
          type: string
          format: email
      required:
        - username
        - password
    UserProfile:
      type: object
      properties:
        user:
          type: string
        role:
          type: string
        email:
          type: string
          nullable: true
    ProfileUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
    OidcExchangeRequest:
      type: object
      properties:
        code:
          type: string
        code_verifier:
          type: string
        client_id:
          type: string
        redirect_uri:
          type: string
          format: uri
        id_token:
          type: string
        access_token:
          type: string
    AssistantRequirementsRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [ask, draft]
          default: ask
        prompt:
          type: string
        requirements_text:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/GenericObject'
        provider:
          type: string
        model:
          type: string
        temperature:
          type: number
        max_tokens:
          type: integer
        reasoning_effort:
          type: string
        motionStyle:
          type: string
        avatarMode:
          type: string
    AssistantReply:
      type: object
      properties:
        reply:
          type: string
        provider:
          type: string
        model:
          type: string
        gesture_mode:
          type: string
        avatar_mode:
          type: string
        avatar_motion:
          $ref: '#/components/schemas/GenericObject'
        gesture_summary:
          $ref: '#/components/schemas/GenericObject'
        gesture_timeline:
          $ref: '#/components/schemas/GenericObjectList'
    FormField:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
        value:
          nullable: true
        options:
          type: array
          items:
            type: string
        description:
          type: string
      required:
        - id
    FormFillRequest:
      type: object
      properties:
        prompt:
          type: string
        workflow:
          type: string
        scope:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
        provider:
          type: string
        model:
          type: string
        temperature:
          type: number
        max_tokens:
          type: integer
      required:
        - fields
    FormSuggestion:
      type: object
      properties:
        field_id:
          type: string
        value:
          nullable: true
        rationale:
          type: string
    RagMcpRequest:
      type: object
      properties:
        prompt:
          type: string
        rag:
          $ref: '#/components/schemas/GenericObject'
        mcp:
          $ref: '#/components/schemas/GenericObject'
        provider:
          type: string
        model:
          type: string
        temperature:
          type: number
        max_tokens:
          type: integer
      required:
        - prompt
    PlaygroundPlanRequest:
      type: object
      properties:
        prompt:
          type: string
        provider:
          type: string
        model:
          type: string
        codingagent:
          type: string
      required:
        - prompt
    VoiceToken:
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        label:
          type: string
        created_at:
          type: string
          format: date-time
        masked:
          type: string
    VoiceTokenCreateRequest:
      type: object
      properties:
        user:
          type: string
        label:
          type: string
    VoiceCaptureRequest:
      type: object
      properties:
        text:
          type: string
        thought:
          type: string
        todo:
          type: string
        note:
          type: string
        source:
          type: string
        locale:
          type: string
        shortcut:
          type: string
        token:
          type: string
        voice_token:
          type: string
        api_key:
          type: string
    VoiceSttRequest:
      type: object
      properties:
        audio_base64:
          type: string
          description: Base64-encoded audio payload.
        lang:
          type: string
        prompt:
          type: string
        message:
          type: string
        query:
          type: string
        motionStyle:
          type: string
        gesture_mode:
          type: string
        avatarMode:
          type: string
        avatar_mode:
          type: string
        collaborationMode:
          type: boolean
        collaboration_mode:
          type: boolean
        token:
          type: string
        voice_token:
          type: string
    VoiceSttResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        text:
          type: string
        lang:
          type: string
        gesture_mode:
          type: string
        avatar_mode:
          type: string
        collaboration_mode:
          type: boolean
        reason:
          type: string
        avatar_motion:
          $ref: '#/components/schemas/GenericObject'
        gesture_summary:
          $ref: '#/components/schemas/GenericObject'
        gesture_timeline:
          $ref: '#/components/schemas/GenericObjectList'
    JobCreateRequest:
      type: object
      properties:
        workflow:
          type: string
        project_id:
          type: string
        team_id:
          type: string
        project_name:
          type: string
        project_root:
          type: string
        create_project:
          type: boolean
        requirements_text:
          type: string
        requirements_path:
          type: string
        project_run:
          type: boolean
        topic_source:
          type: string
        topic_output:
          type: string
        projects:
          type: string
        jql:
          type: string
        action_plan:
          type: boolean
        dry_run:
          type: boolean
        space:
          type: string
        use_rovo:
          type: boolean
        delivery_project_root:
          type: string
        delivery_config:
          type: string
        delivery_run:
          type: boolean
        delivery_allow_unfinished:
          type: boolean
        llm_provider:
          type: string
        llm_model:
          type: string
        llm_temperature:
          type: number
        llm_max_tokens:
          type: integer
        repo_url:
          type: string
        repo_branch:
          type: string
        work_branch:
          type: string
        repo_subdir:
          type: string
        requirements_relpath:
          type: string
        fork_org:
          type: string
        commit_message:
          type: string
        git_author_name:
          type: string
        git_author_email:
          type: string
        token_scope:
          type: string
        job_secrets:
          type: array
          items:
            type: string
      required:
        - workflow
    Job:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        workflow:
          type: string
        owner:
          type: string
        project_id:
          type: string
          nullable: true
        team_id:
          type: string
          nullable: true
        progress:
          type: integer
        archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        workspace:
          $ref: '#/components/schemas/GenericObject'
        token_estimate:
          type: integer
        token_debited:
          type: integer
    WorkspaceRequest:
      type: object
      properties:
        action:
          type: string
          example: create
        force:
          type: boolean
        timeout_sec:
          type: number
        name:
          type: string
        region:
          type: string
        sku:
          type: string
        os_image:
          type: string
        public_key_id:
          type: string
        init_script:
          type: string
    TodoCreateRequest:
      type: object
      properties:
        text:
          type: string
        thought:
          type: string
        todo:
          type: string
        source:
          type: string
        device:
          type: string
        defer_until_idle:
          type: boolean
        available_after:
          type: string
          format: date-time
        meta:
          $ref: '#/components/schemas/GenericObject'
    Todo:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        status:
          type: string
        source:
          type: string
        device:
          type: string
        priority:
          nullable: true
        notes:
          nullable: true
        tags:
          type: array
          items:
            type: string
        defer_until_idle:
          type: boolean
        available_after:
          type: string
          nullable: true
        execution_state:
          type: string
        route:
          $ref: '#/components/schemas/GenericObject'
        links:
          $ref: '#/components/schemas/GenericObject'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Schedule:
      type: object
      properties:
        id:
          type: string
        todo_id:
          type: string
        status:
          type: string
        run_at:
          type: string
          format: date-time
        route_override:
          $ref: '#/components/schemas/GenericObject'
        subtask_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    ScheduleRequest:
      type: object
      properties:
        run_at:
          type: string
          format: date-time
        scheduled_for:
          type: string
          format: date-time
        available_after:
          type: string
          format: date-time
        delay_sec:
          type: number
        route_override:
          $ref: '#/components/schemas/GenericObject'
    SubtaskCreateRequest:
      type: object
      properties:
        action:
          type: string
          enum: [todo_execute, assistant_requirements, playground_plan, submit_job]
        payload:
          $ref: '#/components/schemas/GenericObject'
        scope_type:
          type: string
        scope_id:
          type: string
        timeout_sec:
          type: number
      required:
        - action
    Subtask:
      type: object
      properties:
        task_id:
          type: string
        action:
          type: string
        status:
          type: string
        owner:
          type: string
        scope_type:
          type: string
        scope_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        result:
          $ref: '#/components/schemas/GenericObject'
    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        team_id:
          type: string
          nullable: true
        leaders:
          type: array
          items:
            type: string
        contributors:
          type: array
          items:
            type: string
        viewers:
          type: array
          items:
            type: string
        permissions:
          $ref: '#/components/schemas/GenericObject'
    Team:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        parent_id:
          type: string
          nullable: true
        leaders:
          type: array
          items:
            type: string
        members:
          type: array
          items:
            type: string
    RequirementItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        priority:
          type: string
        status:
          type: string
        acceptance_criteria:
          type: array
          items:
            type: string
    RagSource:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
        path:
          type: string
        text:
          type: string
        metadata:
          $ref: '#/components/schemas/GenericObject'
    RagIndexSummary:
      type: object
      properties:
        name:
          type: string
        documents:
          type: integer
        chunks:
          type: integer
        updated_at:
          type: string
          nullable: true
    RagIndexCreateRequest:
      type: object
      properties:
        name:
          type: string
        chunk_size:
          type: integer
        chunk_overlap:
          type: integer
        max_chunks:
          type: integer
        sources:
          type: array
          items:
            $ref: '#/components/schemas/RagSource'
        paths:
          type: array
          items:
            type: string
      required:
        - name
    RagMatch:
      type: object
      properties:
        chunk_id:
          type: string
        source:
          type: string
        score:
          type: number
        text:
          type: string
        citation:
          type: string
        metadata:
          $ref: '#/components/schemas/GenericObject'
    RagQueryRequest:
      type: object
      properties:
        name:
          type: string
        query:
          type: string
        top_k:
          type: integer
        min_score:
          type: number
      required:
        - query
    RagQueryResponse:
      type: object
      properties:
        name:
          type: string
        query:
          type: string
        matches:
          type: array
          items:
            $ref: '#/components/schemas/RagMatch'
        context:
          type: string
    McpServerConfig:
      type: object
      properties:
        name:
          type: string
        base_url:
          type: string
          format: uri
        auth_type:
          type: string
          enum: [bearer, oauth, none]
        auth_token:
          type: string
        headers:
          $ref: '#/components/schemas/GenericObject'
        timeout:
          type: integer
      required:
        - name
        - base_url
    McpToolCallRequest:
      type: object
      properties:
        tool:
          type: string
        arguments:
          $ref: '#/components/schemas/GenericObject'
      required:
        - tool
    TokenSnapshot:
      type: object
      properties:
        balance:
          type: integer
        paid_balance:
          type: integer
        free_balance:
          type: integer
        reserved:
          type: integer
        in_use:
          type: integer
        available:
          type: integer
        capacity:
          type: integer
        low_threshold:
          type: integer
    TokenActionRequest:
      type: object
      properties:
        action:
          type: string
          enum: [review, add, cashout, grant, sync]
        username:
          type: string
        target_user:
          type: string
        password:
          type: string
          format: password
        token_amount:
          type: integer
        btc_amount:
          type: number
        balance:
          type: integer
        paid_balance:
          type: integer
        free_balance:
          type: integer
        capacity:
          type: integer
        source:
          type: string
    SecretSummary:
      type: object
      properties:
        name:
          type: string
        masked:
          type: string
        updated_at:
          type: string
          format: date-time
    SecretCreateRequest:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
      required:
        - name
        - value
paths:
  /health:
    get:
      tags: [Public]
      summary: Public docs health helper
      description: Available when the docs helper is registered by `api_docs.add_api_documentation_support()`.
      security: []
      responses:
        '200':
          description: Public health payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /api/health:
    get:
      tags: [Public]
      summary: Backend operational health
      security: []
      responses:
        '200':
          description: Operational health summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/version:
    get:
      tags: [Public]
      summary: Backend version info
      security: []
      responses:
        '200':
          description: Build/version metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /metrics:
    get:
      tags: [Public]
      summary: Prometheus metrics
      description: The path is configurable through `REFINER_METRICS_PATH`; `/metrics` is the default.
      security: []
      responses:
        '200':
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string
  /api/setup:
    post:
      tags: [Auth]
      summary: Create the first local admin user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '201':
          description: Admin user created and logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/login:
    post:
      tags: [Auth]
      summary: Log in with local credentials
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session established
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Login throttled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/logout:
    post:
      tags: [Auth]
      summary: Log out the current session
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/session:
    get:
      tags: [Auth]
      summary: Return the current session state
      security: []
      responses:
        '200':
          description: Session state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionState'
  /api/profile:
    get:
      tags: [Auth]
      summary: Get the current profile
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Auth]
      summary: Update the current profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/sso/issue:
    post:
      tags: [Auth]
      summary: Issue a one-time SSO token for the current user
      responses:
        '200':
          description: SSO token issued
          content:
