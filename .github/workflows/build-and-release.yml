name: Build and Release

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub release from the selected v* tag ref"
        required: true
        type: boolean
        default: false
      draft_release:
        description: "Mark a manually published release as draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark a manually published release as prerelease"
        required: true
        type: boolean
        default: false

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (runner Python)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use runner Python runtime
        run: python3 --version

      - name: Ensure Python tooling is available
        run: |
          python3 -m pip --version || (
            sudo apt-get update &&
            sudo apt-get install -y --no-install-recommends python3-pip python3-venv
          )

      - name: Install Dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt
          .venv/bin/python -m pip install -e .

      - name: Run Test Suite
        run: .venv/bin/python -m pytest -q

  nmstt-rust:
    name: nmstt Rust Build/Test
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect nmstt Rust crate
        id: nmstt_crate
        run: |
          candidates=()
          if [[ -n "${NMSTT_DIR:-}" ]]; then
            candidates+=("${NMSTT_DIR}")
          fi
          if [[ -n "${GITHUB_WORKSPACE:-}" ]]; then
            candidates+=("${GITHUB_WORKSPACE}/../nmstt")
            candidates+=("$(dirname "${GITHUB_WORKSPACE}")/nmstt")
          fi
          candidates+=("/home/pbisaacs/Developer/neuralmimicry/nmstt")

          for candidate in "${candidates[@]}"; do
            if [[ -f "${candidate}/Cargo.toml" ]]; then
              resolved="$(cd "${candidate}" && pwd)"
              echo "path=${resolved}" >> "$GITHUB_OUTPUT"
              echo "manifest=${resolved}/Cargo.toml" >> "$GITHUB_OUTPUT"
              echo "present=true" >> "$GITHUB_OUTPUT"
              echo "Using nmstt crate at ${resolved}"
              exit 0
            fi
          done

          echo "path=" >> "$GITHUB_OUTPUT"
          echo "manifest=" >> "$GITHUB_OUTPUT"
          echo "present=false" >> "$GITHUB_OUTPUT"
          echo "No nmstt crate detected on this runner."

      - name: Ensure rustup supports quiet toolchain listing
        if: steps.nmstt_crate.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -x "$HOME/.cargo/bin/rustup" ]] && "$HOME/.cargo/bin/rustup" toolchain list --quiet >/dev/null 2>&1; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            exit 0
          fi
          if rustup toolchain list --quiet >/dev/null 2>&1; then
            exit 0
          fi

          echo "Installing upstream rustup because system rustup lacks '--quiet' support."
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused --location --silent --show-error --fail https://sh.rustup.rs | sh -s -- --default-toolchain none -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup Rust Toolchain
        if: steps.nmstt_crate.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Export Rust environment paths
        if: steps.nmstt_crate.outputs.present == 'true'
        run: |
          echo "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" >> "$GITHUB_ENV"

      - name: Install Native Build Dependencies
        if: steps.nmstt_crate.outputs.present == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config clang libclang-dev

      - name: Cache Rust Artifacts
        if: steps.nmstt_crate.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ steps.nmstt_crate.outputs.path }} -> target

      - name: Build nmstt Rust Crate
        if: steps.nmstt_crate.outputs.present == 'true'
        run: cargo build --locked --manifest-path "${{ steps.nmstt_crate.outputs.manifest }}"

      - name: Test nmstt Rust Crate
        if: steps.nmstt_crate.outputs.present == 'true'
        run: cargo test --locked --manifest-path "${{ steps.nmstt_crate.outputs.manifest }}" --all-targets

      - name: Skip nmstt Rust Crate checks
        if: steps.nmstt_crate.outputs.present != 'true'
        run: echo "No nmstt Cargo.toml was detected on this runner; skipping Rust service build/test."

  package-release:
    name: Package Release
    needs:
      - test
      - nmstt-rust
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      package_version: ${{ steps.meta.outputs.package_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use runner Python runtime
        run: python3 --version

      - name: Ensure Python tooling is available
        run: |
          python3 -m pip --version || (
            sudo apt-get update &&
            sudo apt-get install -y --no-install-recommends python3-pip python3-venv
          )

      - name: Install Build Tooling
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt
          .venv/bin/python -m pip install build twine

      - name: Compute artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(
            sed -n '/^\[project\]/,/^\[/ s/^version = "\(.*\)"/\1/p' pyproject.toml |
              head -n 1
          )
          if [[ -z "$package_version" ]]; then
            echo "::error::Unable to determine pyproject project.version"
            exit 1
          fi
          short_sha="${GITHUB_SHA:0:7}"
          release_tag=""

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            artifact_version="${release_tag#v}"
          else
            artifact_version="${package_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
            if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master || "${GITHUB_REF}" == refs/heads/develop ]]; then
              release_tag="latest-${GITHUB_REF#refs/heads/}"
            fi
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* && "$artifact_version" != "$package_version" ]]; then
            echo "::error::Tag ${release_tag} does not match pyproject.toml"
            echo "::error::version ${package_version}"
            exit 1
          fi

          artifact_name="refiner-dist-${artifact_version}"

          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$artifact_version" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          alias_args=()
          release_tag="${{ steps.meta.outputs.release_tag }}"
          if [[ "${release_tag}" == latest-* ]]; then
            alias_args=(--deb-channel-alias "${release_tag}")
          fi

          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh \
            --version "${{ steps.meta.outputs.package_version }}" \
            --deb-version "${{ steps.meta.outputs.artifact_version }}" \
            "${alias_args[@]}" \
            --python ".venv/bin/python" \
            --output-dir ./dist

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish Release
    needs: package-release
    runs-on: [self-hosted, Linux, X64]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (
        github.event_name == 'push' &&
        (
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/develop'
        )
      ) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write

    steps:
      - name: Validate publish target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.package-release.outputs.release_tag }}" ]]; then
            echo "::error::Publishing requires a resolved release_tag from package metadata"
            exit 1
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.package-release.outputs.artifact_name }}
          path: ./dist

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.package-release.outputs.release_tag }}
          DRAFT_RELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release }}
          MANUAL_PRERELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          gh_retry() {
            local max_attempts=5
            local attempt=1
            local retry_delay=6
            while true; do
              if "$@"; then
                return 0
              fi
              if (( attempt >= max_attempts )); then
                echo "::error::GitHub API command failed after ${max_attempts} attempts: $*" >&2
                return 1
              fi
              echo "::warning::GitHub API command failed (attempt ${attempt}/${max_attempts}); retrying in ${retry_delay}s..." >&2
              sleep "${retry_delay}"
              attempt=$((attempt + 1))
            done
          }

          files=(dist/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No packaged artifacts were downloaded"
            exit 1
          fi

          title="Refiner ${RELEASE_TAG}"
          prerelease="${MANUAL_PRERELEASE}"
          if [[ "${RELEASE_TAG}" == latest-* ]]; then
            prerelease="true"
          fi
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" && "${RELEASE_TAG}" == *-* ]]; then
            prerelease="true"
          fi

          if gh_retry gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            edit_args=(
              "${RELEASE_TAG}"
              --target "${GITHUB_SHA}"
              --title "${title}"
            )
            if [[ "${DRAFT_RELEASE}" == "true" ]]; then
              edit_args+=(--draft)
            fi
            if [[ "${prerelease}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            gh_retry gh release edit "${edit_args[@]}"
            if [[ "${RELEASE_TAG}" == latest-* ]]; then
              mapfile -t existing_assets < <(gh_retry gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')
              for asset_name in "${existing_assets[@]}"; do
                gh_retry gh release delete-asset "${RELEASE_TAG}" "${asset_name}" -y || true
              done
            fi
            gh_retry gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
            exit 0
          fi

          args=(
            "${RELEASE_TAG}"
            "${files[@]}"
            --target "${GITHUB_SHA}"
            --title "${title}"
            --generate-notes
          )

          if [[ "${DRAFT_RELEASE}" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh_retry gh release create "${args[@]}"

  publish-container-arch:
    name: Publish Container (${{ matrix.runner_arch }})
    needs: package-release
    runs-on:
      - self-hosted
      - Linux
      - ${{ matrix.runner_arch }}
    timeout-minutes: 60
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (
        github.event_name == 'push' &&
        (
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/develop'
        )
      ) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        runner_arch: [X64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate publish target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.package-release.outputs.release_tag }}" ]]; then
            echo "::error::Publishing container requires a resolved release tag"
            exit 1
          fi

      - name: Build and push architecture image
        shell: bash
        env:
          IMAGE_REPO: ghcr.io/neuralmimicry/refiner
          RELEASE_TAG: ${{ needs.package-release.outputs.release_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_PASSWORD != '' && secrets.GHCR_PASSWORD || github.token }}
          GHCR_AUTH_SOURCE: ${{ secrets.GHCR_PASSWORD != '' && 'secrets.GHCR_PASSWORD' || 'github.token' }}
          RUNNER_ARCH: ${{ matrix.runner_arch }}
        run: |
          set -euo pipefail

          push_with_retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local retry_delay=12
            while true; do
              if "$@"; then
                return 0
              fi
              if (( attempt >= max_attempts )); then
                echo "::error::Push failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "::warning::Push attempt ${attempt}/${max_attempts} failed for ${image_ref}; retrying in ${retry_delay}s..."
              sleep "${retry_delay}"
              attempt=$((attempt + 1))
            done
          }

          DOCKER_CMD=()

          resolve_docker_cmd() {
            if [[ ${#DOCKER_CMD[@]} -gt 0 ]]; then
              return 0
            fi
            if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
              DOCKER_CMD=(docker)
              return 0
            fi
            if command -v sudo >/dev/null 2>&1 && command -v docker >/dev/null 2>&1 && sudo -n docker info >/dev/null 2>&1; then
              DOCKER_CMD=(sudo docker)
              return 0
            fi
            return 1
          }

          docker_login() {
            printf '%s' "${GHCR_PASSWORD}" | "${DOCKER_CMD[@]}" login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          }

          docker_build() {
            if [[ "${DOCKER_CMD[0]}" == "sudo" ]]; then
              sudo DOCKER_BUILDKIT=0 docker build --pull -f Containerfile -t "${image_ref}" .
            else
              DOCKER_BUILDKIT=0 docker build --pull -f Containerfile -t "${image_ref}" .
            fi
          }

          docker_push() {
            "${DOCKER_CMD[@]}" push "${image_ref}"
          }

          podman_push_default() {
            podman push --retry 3 --retry-delay 8s "${image_ref}"
          }

          podman_push_compat() {
            podman push --retry 3 --retry-delay 8s \
              --format v2s2 \
              --compression-format gzip \
              --force-compression \
              --remove-signatures \
              "${image_ref}"
          }

          case "${RUNNER_ARCH}" in
            X64) arch="amd64" ;;
            ARM64) arch="arm64" ;;
            *)
              echo "::error::Unsupported runner architecture: ${RUNNER_ARCH}"
              exit 1
              ;;
          esac

          image_ref="${IMAGE_REPO}:${RELEASE_TAG}-${arch}"
          echo "Using GHCR credentials source: ${GHCR_AUTH_SOURCE}"
          if command -v podman >/dev/null 2>&1; then
            printf '%s' "${GHCR_PASSWORD}" | podman login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            if podman build --format docker --pull -f Containerfile -t "${image_ref}" .; then
              if push_with_retry 2 podman_push_default; then
                exit 0
              fi
              echo "::warning::Default podman push failed for ${image_ref}; retrying with docker schema2 compatibility options."
              if push_with_retry 2 podman_push_compat; then
                exit 0
              fi
            fi
            if ! resolve_docker_cmd; then
              echo "::error::Podman publish failed and docker fallback is unavailable (docker missing or no daemon access, including sudo)."
              exit 1
            fi
            echo "::warning::Podman publish failed for ${image_ref}; falling back to docker publish."
            docker_login
            docker_build
            push_with_retry 5 docker_push
          elif resolve_docker_cmd; then
            docker_login
            docker_build
            push_with_retry 5 docker_push
          else
            echo "::error::Neither podman nor a usable docker daemon (direct or sudo) is available on this runner."
            exit 1
          fi

  publish-container-manifest:
    name: Publish Container Manifest
    needs:
      - package-release
      - publish-container-arch
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (
        github.event_name == 'push' &&
        (
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/develop'
        )
      ) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate publish target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.package-release.outputs.release_tag }}" ]]; then
            echo "::error::Publishing container manifest requires a resolved release tag"
            exit 1
          fi

      - name: Publish multi-architecture manifest
        shell: bash
        env:
          IMAGE_REPO: ghcr.io/neuralmimicry/refiner
          RELEASE_TAG: ${{ needs.package-release.outputs.release_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_PASSWORD != '' && secrets.GHCR_PASSWORD || github.token }}
          GHCR_AUTH_SOURCE: ${{ secrets.GHCR_PASSWORD != '' && 'secrets.GHCR_PASSWORD' || 'github.token' }}
        run: |
          set -euo pipefail

          push_with_retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local retry_delay=12
            while true; do
              if "$@"; then
                return 0
              fi
              if (( attempt >= max_attempts )); then
                echo "::error::Manifest publish failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "::warning::Manifest push attempt ${attempt}/${max_attempts} failed; retrying in ${retry_delay}s..."
              sleep "${retry_delay}"
              attempt=$((attempt + 1))
            done
          }

          DOCKER_CMD=()

          resolve_docker_cmd() {
            if [[ ${#DOCKER_CMD[@]} -gt 0 ]]; then
              return 0
            fi
            if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
              DOCKER_CMD=(docker)
              return 0
            fi
            if command -v sudo >/dev/null 2>&1 && command -v docker >/dev/null 2>&1 && sudo -n docker info >/dev/null 2>&1; then
              DOCKER_CMD=(sudo docker)
              return 0
            fi
            return 1
          }

          docker_login() {
            printf '%s' "${GHCR_PASSWORD}" | "${DOCKER_CMD[@]}" login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          }

          docker_manifest_push() {
            "${DOCKER_CMD[@]}" manifest push --purge "${image_ref}"
          }

          podman_manifest_push_default() {
            podman manifest push --all "${image_ref}" "docker://${image_ref}"
          }

          podman_manifest_push_compat() {
            podman manifest push \
              --all \
              --format v2s2 \
              --compression-format gzip \
              --force-compression \
              --remove-signatures \
              "${image_ref}" \
              "docker://${image_ref}"
          }

          image_ref="${IMAGE_REPO}:${RELEASE_TAG}"
          amd64_ref="${IMAGE_REPO}:${RELEASE_TAG}-amd64"
          arm64_ref="${IMAGE_REPO}:${RELEASE_TAG}-arm64"
          echo "Using GHCR credentials source: ${GHCR_AUTH_SOURCE}"

          if command -v podman >/dev/null 2>&1; then
            printf '%s' "${GHCR_PASSWORD}" | podman login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            podman manifest rm "${image_ref}" >/dev/null 2>&1 || true
            if podman manifest create "${image_ref}" \
              && podman manifest add "${image_ref}" "docker://${amd64_ref}" \
              && podman manifest add "${image_ref}" "docker://${arm64_ref}"; then
              if push_with_retry 2 podman_manifest_push_default; then
                exit 0
              fi
              echo "::warning::Default podman manifest push failed for ${image_ref}; retrying with docker schema2 compatibility options."
              if push_with_retry 2 podman_manifest_push_compat; then
                exit 0
              fi
            fi
            if ! resolve_docker_cmd; then
              echo "::error::Podman manifest publish failed and docker fallback is unavailable (docker missing or no daemon access, including sudo)."
              exit 1
            fi
            echo "::warning::Podman manifest publish failed for ${image_ref}; falling back to docker manifest publish."
            docker_login
            "${DOCKER_CMD[@]}" manifest rm "${image_ref}" >/dev/null 2>&1 || true
            "${DOCKER_CMD[@]}" manifest create "${image_ref}" "${amd64_ref}" "${arm64_ref}"
            "${DOCKER_CMD[@]}" manifest annotate "${image_ref}" "${amd64_ref}" --os linux --arch amd64
            "${DOCKER_CMD[@]}" manifest annotate "${image_ref}" "${arm64_ref}" --os linux --arch arm64
            push_with_retry 5 docker_manifest_push
          elif resolve_docker_cmd; then
            docker_login
            "${DOCKER_CMD[@]}" manifest rm "${image_ref}" >/dev/null 2>&1 || true
            "${DOCKER_CMD[@]}" manifest create "${image_ref}" "${amd64_ref}" "${arm64_ref}"
            "${DOCKER_CMD[@]}" manifest annotate "${image_ref}" "${amd64_ref}" --os linux --arch amd64
            "${DOCKER_CMD[@]}" manifest annotate "${image_ref}" "${arm64_ref}" --os linux --arch arm64
            push_with_retry 5 docker_manifest_push
          else
            echo "::error::Neither podman nor a usable docker daemon (direct or sudo) is available on this runner."
            exit 1
          fi
