name: Build and Release

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub release from the selected v* tag ref"
        required: true
        type: boolean
        default: false
      draft_release:
        description: "Mark a manually published release as draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark a manually published release as prerelease"
        required: true
        type: boolean
        default: false

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (runner Python)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use runner Python runtime
        run: python3 --version

      - name: Ensure pip is available
        run: |
          python3 -m pip --version || (
            sudo apt-get update &&
            sudo apt-get install -y --no-install-recommends python3-pip
          )

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install -e .

      - name: Run Test Suite
        run: python3 -m pytest -q

  stt-rust:
    name: STT Rust Build/Test
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Native Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config clang

      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stt_rust

      - name: Build STT Rust Crate
        run: cargo build --locked --manifest-path stt_rust/Cargo.toml

      - name: Test STT Rust Crate
        run: cargo test --locked --manifest-path stt_rust/Cargo.toml --all-targets

  package-release:
    name: Package Release
    needs:
      - test
      - stt-rust
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      package_version: ${{ steps.meta.outputs.package_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use runner Python runtime
        run: python3 --version

      - name: Ensure pip is available
        run: |
          python3 -m pip --version || (
            sudo apt-get update &&
            sudo apt-get install -y --no-install-recommends python3-pip
          )

      - name: Install Build Tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install build twine

      - name: Compute artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(
            sed -n '/^\[project\]/,/^\[/ s/^version = "\(.*\)"/\1/p' pyproject.toml |
              head -n 1
          )
          if [[ -z "$package_version" ]]; then
            echo "::error::Unable to determine pyproject project.version"
            exit 1
          fi
          short_sha="${GITHUB_SHA::0:7}"
          release_tag=""

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            artifact_version="${release_tag#v}"
          else
            artifact_version="${package_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi

          if [[ -n "$release_tag" && "$artifact_version" != "$package_version" ]]; then
            echo "::error::Tag ${release_tag} does not match pyproject.toml"
            echo "::error::version ${package_version}"
            exit 1
          fi

          artifact_name="refiner-dist-${artifact_version}"

          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$artifact_version" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh \
            --version "${{ steps.meta.outputs.package_version }}" \
            --output-dir ./dist

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish Release
    needs: package-release
    runs-on: [self-hosted, Linux, X64]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write

    steps:
      - name: Validate publish target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.package-release.outputs.release_tag }}" ]]; then
            echo "::error::Publishing requires a v* tag ref"
            exit 1
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.package-release.outputs.artifact_name }}
          path: ./dist

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.package-release.outputs.release_tag }}
          DRAFT_RELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release }}
          MANUAL_PRERELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(dist/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No packaged artifacts were downloaded"
            exit 1
          fi

          title="Refiner ${RELEASE_TAG}"
          prerelease="${MANUAL_PRERELEASE}"
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" && "${RELEASE_TAG}" == *-* ]]; then
            prerelease="true"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
            exit 0
          fi

          args=(
            "${RELEASE_TAG}"
            "${files[@]}"
            --target "${GITHUB_SHA}"
            --title "${title}"
            --generate-notes
          )

          if [[ "${DRAFT_RELEASE}" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
