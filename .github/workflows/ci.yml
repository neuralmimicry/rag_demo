name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify (${{ matrix.runner_arch }})
    runs-on: [self-hosted, Linux, "${{ matrix.runner_arch }}"]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        runner_arch: [X64, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use runner Python runtime
        run: python3 --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang cmake pkg-config python3-pip

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install -e .

      - name: Run Python tests
        run: python3 -m pytest -q

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stt_rust

      - name: Run STT Rust tests
        run: cargo test --locked --manifest-path stt_rust/Cargo.toml --all-targets
