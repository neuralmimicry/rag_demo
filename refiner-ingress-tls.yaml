---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: refiner
  namespace: refiner
  labels:
    app.kubernetes.io/name: refiner
    app.kubernetes.io/part-of: refiner-cluster
    nmc.neuralmimicry.ai/workload: refiner
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.neuralmimicry.ai
      secretName: api-neuralmimicry-ai-tls
  rules:
    - host: api.neuralmimicry.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: refiner
                port:
                  number: 5001
